// ── LIVE SCORE UPDATER — patches SP entries with real ESPN results ────────────
async function refreshRecentScores(){
  var today=new Date();
  var dates=[];
  // Check last 3 days for completed games
  for(var i=1;i<=3;i++){
    var d=new Date(today);d.setDate(today.getDate()-i);
    dates.push(d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'));
  }
  var feeds=[
    {url:'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard',team:'HOU',sport:'MLB'},
    {url:'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard',team:'HOU',sport:'NBA'},
    {url:'https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard',team:'359',sport:'EPL',soccerId:true},
    {url:'https://site.api.espn.com/apis/site/v2/sports/soccer/uefa.champions/scoreboard',team:'359',sport:'UCL',soccerId:true},
    {url:'https://site.api.espn.com/apis/site/v2/sports/baseball/college-baseball/scoreboard',team:'251',sport:'NCABB',ncaaId:true},
  ];
  for(var fi=0;fi<feeds.length;fi++){
    var feed=feeds[fi];
    for(var di=0;di<dates.length;di++){
      try{
        var r=await fetch(feed.url+'?dates='+dates[di]);
        var d2=await r.json();
        (d2.events||[]).forEach(function(ev){
          var comps=ev.competitions&&ev.competitions[0];if(!comps) return;
          var teams=comps.competitors||[];if(teams.length<2) return;
          var status=comps.status&&comps.status.type&&comps.status.type.name;
          if(status!=='post') return; // only completed games
          // Check if my team played
          var myTeam=teams.find(function(t){
            if(feed.soccerId) return t.team&&t.team.id===feed.team;
            if(feed.ncaaId) return t.team&&t.team.id===feed.team;
            return t.team&&t.team.abbreviation===feed.team;
          });
          if(!myTeam) return;
          var oppTeam=teams.find(function(t){return t!==myTeam;});
          if(!oppTeam) return;
          var myScore=parseInt(myTeam.score||0);
          var oppScore=parseInt(oppTeam.score||0);
          var result=myScore>oppScore?'W':myScore<oppScore?'L':'D';
          var gameDate=ev.date?ev.date.slice(0,10):'';
          if(!gameDate) return;
          // Find matching SP entry and update it
          SP.forEach(function(sp){
            if(sp.dt!==gameDate) return;
            if(sp.r) return; // already has a result
            var oppAbbr=feed.soccerId?oppTeam.team.abbreviation:oppTeam.team.abbreviation;
            if(sp.ab&&sp.ab!==oppAbbr) return;
            sp.r=result;
            sp.sc=[myScore,oppScore];
            console.log('[ScoreUpdate]',sp.t,sp.dt,result,myScore+'-'+oppScore);
          });
        });
      }catch(e){console.warn('[ScoreUpdate] failed for '+feed.sport+' '+dates[di]+':',e.message);}
    }
  }
}
refreshRecentScores();
setInterval(refreshRecentScores,300000);


// ── LIVE OPPONENT RECORDS (ESPN standings API) ──────────────────────────────
var _liveRecs={};
var _liveRecsFetched=false;

async function fetchLiveRecs(){
  if(_liveRecsFetched) return _liveRecs;
  // 1hr cache
  try{
    var cached=sg('li_recs');
    if(cached&&cached.ts&&(Date.now()-cached.ts)<3600000){
      _liveRecs=cached.data;_liveRecsFetched=true;
      console.log('Live records: loaded from cache,',Object.keys(_liveRecs).length,'teams');
      return _liveRecs;
    }
  }catch(e){}

  var recs={};

  // Parse standings entries helper
  function parseEntries(entries,prefix){
    (entries||[]).forEach(function(e){
      var abbr=e.team&&e.team.abbreviation;
      if(!abbr) return;
      var w=0,l=0,found=false;
      (e.stats||[]).forEach(function(s){
        if(s.name==='wins'||s.abbreviation==='W'){w=Math.round(s.value||0);found=true;}
        if(s.name==='losses'||s.abbreviation==='L'){l=Math.round(s.value||0);}
      });
      if(found) recs[prefix+abbr]=w+'-'+l;
    });
  }

  // NBA standings
  try{
    var r1=await fetch('https://site.api.espn.com/apis/v2/sports/basketball/nba/standings?seasontype=2');
    var d1=await r1.json();
    var entries1=(d1.standings&&d1.standings.entries)||[];
    // also try nested groups
    if(!entries1.length&&d1.children){
      d1.children.forEach(function(g){if(g.standings&&g.standings.entries)entries1=entries1.concat(g.standings.entries);});
    }
    parseEntries(entries1,'NBA_');
    console.log('NBA records:',Object.keys(recs).filter(function(k){return k.startsWith('NBA_');}).length,'teams');
  }catch(e){console.warn('NBA standings error:',e.message);}

  // MLB standings
  try{
    var r2=await fetch('https://site.api.espn.com/apis/v2/sports/baseball/mlb/standings?seasontype=2');
    var d2=await r2.json();
    var entries2=(d2.standings&&d2.standings.entries)||[];
    if(!entries2.length&&d2.children){
      d2.children.forEach(function(g){if(g.standings&&g.standings.entries)entries2=entries2.concat(g.standings.entries);});
    }
    parseEntries(entries2,'MLB_');
    console.log('MLB records:',Object.keys(recs).filter(function(k){return k.startsWith('MLB_');}).length,'teams');
  }catch(e){console.warn('MLB standings error:',e.message);}

  // EPL standings
  try{
    var r3=await fetch('https://site.api.espn.com/apis/v2/sports/soccer/eng.1/standings?seasontype=2');
    var d3=await r3.json();
    var entries3=(d3.standings&&d3.standings.entries)||[];
    if(!entries3.length&&d3.children){
      d3.children.forEach(function(g){if(g.standings&&g.standings.entries)entries3=entries3.concat(g.standings.entries);});
    }
    // EPL: wins-draws-losses
    (entries3||[]).forEach(function(e){
      var abbr=e.team&&e.team.abbreviation;
      if(!abbr) return;
      var w=0,d=0,l=0;
      (e.stats||[]).forEach(function(s){
        if(s.name==='wins'||s.abbreviation==='W') w=Math.round(s.value||0);
        if(s.name==='draws'||s.abbreviation==='D') d=Math.round(s.value||0);
        if(s.name==='losses'||s.abbreviation==='L') l=Math.round(s.value||0);
      });
      recs['SOC_'+abbr]=w+'-'+d+'-'+l;
    });
    console.log('EPL records:',Object.keys(recs).filter(function(k){return k.startsWith('SOC_');}).length,'teams');
  }catch(e){console.warn('EPL standings error:',e.message);}

  // If standings endpoints gave nothing, fallback to scoreboard (gets records for today's teams)
  if(!Object.keys(recs).filter(function(k){return k.startsWith('NBA_');}).length){
    try{
      var rb=await fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard');
      var db=await rb.json();
      (db.events||[]).forEach(function(ev){
        (ev.competitions||[]).forEach(function(comp){
          (comp.competitors||[]).forEach(function(t){
            var abbr=t.team&&t.team.abbreviation;
            var rec=t.records&&t.records[0]&&t.records[0].summary;
            if(abbr&&rec) recs['NBA_'+abbr]=rec;
          });
        });
      });
      console.log('NBA scoreboard fallback:',Object.keys(recs).filter(function(k){return k.startsWith('NBA_');}).length,'teams');
    }catch(e){console.warn('NBA scoreboard fallback error:',e.message);}
  }
  if(!Object.keys(recs).filter(function(k){return k.startsWith('MLB_');}).length){
    try{
      var rb2=await fetch('https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard');
      var db2=await rb2.json();
      (db2.events||[]).forEach(function(ev){
        (ev.competitions||[]).forEach(function(comp){
          (comp.competitors||[]).forEach(function(t){
            var abbr=t.team&&t.team.abbreviation;
            var rec=t.records&&t.records[0]&&t.records[0].summary;
            if(abbr&&rec) recs['MLB_'+abbr]=rec;
          });
        });
      });
      console.log('MLB scoreboard fallback:',Object.keys(recs).filter(function(k){return k.startsWith('MLB_');}).length,'teams');
    }catch(e){console.warn('MLB scoreboard fallback error:',e.message);}
  }

  console.log('Total live records fetched:',Object.keys(recs).length,recs);
  _liveRecs=recs;_liveRecsFetched=true;
  try{ss('li_recs',{ts:Date.now(),data:recs});}catch(e){}
  return recs;
}

function getLiveRec(ev,recs){
  if(!ev||!ev.ab) return null;
  recs=recs||_liveRecs;
  // Abbreviation overrides for ESPN's naming quirks
  var mlbOvr={ATH:'OAK',KC:'KC',TB:'TB',WSH:'WSH',SD:'SD',SF:'SF',LAA:'LAA',LAD:'LAD',CWS:'CWS'};
  if(ev.lg==='NBA') return recs['NBA_'+ev.ab]||null;
  if(ev.lg==='MLB') return recs['MLB_'+(mlbOvr[ev.ab]||ev.ab)]||null;
  if(ev.lg==='EPL'||ev.lg==='UCL'||ev.lg==='FAC'||ev.lg==='CC') return recs['SOC_'+ev.ab]||null;
  return null;
}

// Auto-update MY team records from ESPN every 5 min
async function refreshMyTeamRecords(){
  var updates={};
  try{
    // Astros + Rockets (MLB/NBA standings)
    var [nba,mlb,epl]=await Promise.all([
      fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/hou').then(function(r){return r.json();}),
      fetch('https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/hou').then(function(r){return r.json();}),
      fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/teams/359').then(function(r){return r.json();})
    ]);
    // NBA Houston
    var nbaRec=nba.team&&nba.team.record&&nba.team.record.items&&nba.team.record.items[0]&&nba.team.record.items[0].summary;
    if(nbaRec) updates.Rockets=nbaRec;
    // MLB Houston
    var mlbRec=mlb.team&&mlb.team.record&&mlb.team.record.items&&mlb.team.record.items[0]&&mlb.team.record.items[0].summary;
    if(mlbRec) updates.Astros=mlbRec;
    // Arsenal EPL record (W-D-L)
    var eplStats=epl.team&&epl.team.record&&epl.team.record.items;
    if(eplStats&&eplStats[0]) updates.Arsenal=eplStats[0].summary;
  }catch(e){console.warn('My team records refresh error:',e.message);}
  // Apply updates to TREC
  Object.assign(TREC,updates);
  // Also try UT Baseball from scoreboard results
  try{
    var cb=await fetch('https://site.api.espn.com/apis/site/v2/sports/baseball/college-baseball/teams/251');
    var cbd=await cb.json();
    var cbRec=cbd.team&&cbd.team.record&&cbd.team.record.items&&cbd.team.record.items[0]&&cbd.team.record.items[0].summary;
    if(cbRec) TREC['UT Baseball']=cbRec;
  }catch(e){}
  console.log('[TREC] Updated:',JSON.stringify(TREC));
}

function gline2(ev){

}

function calcStreak(all,id){
  var td=tod(),d=new Date(td+'T12:00:00'),s=0;
  if(!all[td]||!all[td][id]) d.setDate(d.getDate()-1);
  for(var i=0;i<365;i++){
    var k=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
    if(all[k]&&all[k][id]){s++;d.setDate(d.getDate()-1);}else break;
  }
  return s;
}

var SPOTIFY_CLIENT_ID='63231a28f5244c13be514607dfd5a742';
var SPOTIFY_REDIRECT=window.location.origin+window.location.pathname;
var SPOTIFY_SCOPE='user-read-currently-playing user-read-playback-state';

function sptB64(buf){return btoa(String.fromCharCode.apply(null,new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function sptVerifier(){var a=new Uint8Array(32);crypto.getRandomValues(a);return sptB64(a.buffer);}
async function sptChallenge(v){var d=new TextEncoder().encode(v);var h=await crypto.subtle.digest('SHA-256',d);return sptB64(h);}

async function spotifyLogin(){
  var v=await sptVerifier();
  localStorage.setItem('spt_v',v);
  var ch=await sptChallenge(v);
  var p=new URLSearchParams({response_type:'code',client_id:SPOTIFY_CLIENT_ID,scope:SPOTIFY_SCOPE,redirect_uri:SPOTIFY_REDIRECT,code_challenge_method:'S256',code_challenge:ch});
  window.location.href='https://accounts.spotify.com/authorize?'+p.toString();
}

async function spotifyToken(code){
  var v=localStorage.getItem('spt_v')||'';
  var r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({grant_type:'authorization_code',code:code,redirect_uri:SPOTIFY_REDIRECT,client_id:SPOTIFY_CLIENT_ID,code_verifier:v}).toString()});
  var d=await r.json();
  if(d.access_token){
    localStorage.setItem('spt_at',d.access_token);
    localStorage.setItem('spt_rt',d.refresh_token||'');
    localStorage.setItem('spt_exp',String(Date.now()+(d.expires_in||3600)*1000));
    window.history.replaceState({},'',window.location.pathname);
    return d.access_token;
  }
  return null;
}

async function spotifyRefresh(){
  var rt=localStorage.getItem('spt_rt');
  if(!rt) return null;
  var r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({grant_type:'refresh_token',refresh_token:rt,client_id:SPOTIFY_CLIENT_ID}).toString()});
  var d=await r.json();
  if(d.access_token){
    localStorage.setItem('spt_at',d.access_token);
    localStorage.setItem('spt_exp',String(Date.now()+(d.expires_in||3600)*1000));
    if(d.refresh_token) localStorage.setItem('spt_rt',d.refresh_token);
    return d.access_token;
  }
  return null;
}

async function getSpotifyToken(){
  var at=localStorage.getItem('spt_at');
  var exp=parseInt(localStorage.getItem('spt_exp')||'0');
  if(at&&Date.now()<exp-60000) return at;
  return spotifyRefresh();
}

            var games=liveGames.filter(function(g){return g.sport===sp;});
            if(!games.length) return;
            // Sport label badge
            tickerEls.push(cr('span',{key:'lbl'+sp,style:{
              display:'inline-flex',alignItems:'center',
              background:SPORT_COLORS[sp]||'#333',
              color:'#fff',fontSize:9,fontWeight:700,
              padding:'2px 8px',margin:'0 6px 0 8px',
              borderRadius:3,letterSpacing:'0.06em',flexShrink:0
            }},sp));
            games.forEach(function(g,gi){
              var t0=g.teams[0]||{},t1=g.teams[1]||{};
              var isLive=g.statusName==='in';
              var isFinal=g.statusName==='post';
              var hasSc=t0.score!==''&&t1.score!=='';
              var myTeam=g.priority;
              tickerEls.push(cr('span',{key:sp+gi,style:{
                display:'inline-flex',alignItems:'center',gap:3,
                padding:'0 10px',borderRight:'1px solid #252525',
                background:myTeam?'rgba(191,87,0,0.12)':'transparent',
                flexShrink:0,height:30
              }},
                cr('img',{src:t0.logo,style:{width:14,height:14,objectFit:'contain',flexShrink:0},onError:function(e){e.target.style.display='none';}}),
                cr('span',{style:{fontSize:12,fontWeight:myTeam?700:500,color:myTeam?'#fff':'#ccc'}},t0.abbr),
                hasSc
                  ?cr('span',{style:{fontSize:13,fontWeight:800,color:myTeam?T.or:'#eee',margin:'0 2px'}},t0.score+'-'+t1.score)
                  :cr('span',{style:{fontSize:9,color:'#555',margin:'0 3px'}},g.detail||'vs'),
                cr('span',{style:{fontSize:12,fontWeight:myTeam?700:500,color:myTeam?'#fff':'#ccc'}},t1.abbr),
                cr('img',{src:t1.logo,style:{width:14,height:14,objectFit:'contain',flexShrink:0},onError:function(e){e.target.style.display='none';}}),
                isLive&&cr('span',{style:{fontSize:8,color:'#f87171',fontWeight:700,marginLeft:3}},'● '+g.detail),
                isFinal&&!hasSc&&cr('span',{style:{fontSize:8,color:'#888',marginLeft:3}},'Final')
              ));
            });
          });
          if(!tickerEls.length) return cr('div',{style:{fontSize:10,color:'#555',paddingLeft:12}},'No games today');
          // Duplicate for seamless loop
          var doubled=tickerEls.concat(tickerEls.map(function(el,i){return React.cloneElement(el,{key:'dup'+i});}));
          var speed=Math.max(40,tickerEls.length*3); // scale speed to content length
          return cr('div',{style:{flex:1,overflow:'hidden',height:'100%',display:'flex',alignItems:'center'}},
            cr('div',{style:{
              display:'inline-flex',alignItems:'center',
              animation:'marquee '+speed+'s linear infinite',
              whiteSpace:'nowrap'
            }}, doubled)
          );
        })()
    ),
    // ── SPOTIFY NOW PLAYING ──────────────────────────────────────────────────
    cr('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'5px 1.5rem',borderTop:'1px solid '+T.bo,background:'rgba(29,185,84,0.05)'}},
      cr('div',{style:{fontSize:10,color:'#1DB954',fontWeight:700,letterSpacing:'0.08em',flexShrink:0}},'🎵 NOW PLAYING'),
      cr('div',{style:{flex:1,marginLeft:12}},cr(SpotifyWidget,null))
    ),
    // ── HEADLINES TICKER ──────────────────────────────────────────────────────
    cr('div',{style:{display:'flex',alignItems:'center',borderTop:'1px solid '+T.bo,height:26,overflow:'hidden'}},
      cr('div',{style:{background:'#CC0000',padding:'0 10px',height:'100%',display:'flex',alignItems:'center',flexShrink:0}},
        cr('span',{style:{fontSize:10,fontWeight:700,color:'#fff',letterSpacing:'0.06em'}},'HEADLINES')
      ),
      cr('div',{style:{flex:1,overflow:'hidden',height:'100%',display:'flex',alignItems:'center'}},
        cr('div',{style:{display:'inline-block',whiteSpace:'nowrap',animation:'marquee 180s linear infinite',fontSize:11,color:T.se,paddingLeft:16}},
          doubled
        )
      )
    )
  );
}

function glabel(ev,recs){
  var isUT=ev.t==='UT Baseball'||ev.t==='UT Football';
  var my=isUT?'Texas':ev.t==='Arsenal'?'ARS':'HOU';
  var rec=TREC[ev.t];
  var myS=rec?my+' ('+rec+')':my;
  var liveRec=getLiveRec(ev,recs);
  var orc=liveRec||(ev.orc||'');
  var oppS=orc?ev.ab+' ('+orc+')':ev.ab;
  return myS+' '+(ev.hm?'vs':'@')+' '+oppS+(ev.star?' ⭐':'');
}

function calcStreak(all,id){
  var td=tod(),d=new Date(td+'T12:00:00'),s=0;
  if(!all[td]||!all[td][id]) d.setDate(d.getDate()-1);
  for(var i=0;i<365;i++){
    var k=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
    if(all[k]&&all[k][id]){s++;d.setDate(d.getDate()-1);}else break;
  }
  return s;
}

// ── PR DETECTION ─────────────────────────────────────────────────────────────
function extractWeight(w){
  if(!w) return 0;
  var s=String(w);
  // Handle "150 assist" → treat as assisted = lower is harder, skip for PR
  if(s.toLowerCase().indexOf('assist')>-1) return 0;
  // Handle "2 plates", "6 plates" → rough lb conversion (45lb plates + 45lb bar)
  var platesMatch=s.match(/(\d+)\s*plates?/i);
  if(platesMatch) return parseInt(platesMatch[1])*45+45;
  // Handle bodyweight
  if(s.toLowerCase()==='bodyweight'||s.toLowerCase()==='bw') return 1;
  // Extract first number
  var num=parseFloat(s.replace(/[^0-9.]/g,''));
  return isNaN(num)?0:num;
}

function buildPRMap(wkts){
  var prs={}; // {exerciseName: {weight, date, reps}}
  (wkts||[]).forEach(function(wk){
    (wk.exercises||[]).forEach(function(ex){
      var name=(ex.name||'').trim();
      if(!name) return;
      var key=name.toLowerCase();
      (ex.sets||[]).forEach(function(s){
        var w=extractWeight(s.w);
        if(w<=0) return;
        if(!prs[key]||w>prs[key].weight){
          prs[key]={name:name,weight:w,rawWeight:s.w,reps:s.r,date:wk.date};
        }
      });
    });
  });
  return prs;
}

function isPR(wkts,exerciseName,weight,excludeWktId){
  var w=extractWeight(weight);
  if(w<=0) return false;
  var key=(exerciseName||'').trim().toLowerCase();
  var best=0;
  (wkts||[]).forEach(function(wk){
    if(wk.id===excludeWktId) return;
    (wk.exercises||[]).forEach(function(ex){
      if((ex.name||'').trim().toLowerCase()!==key) return;
      (ex.sets||[]).forEach(function(s){
        var sw=extractWeight(s.w);
        if(sw>best) best=sw;
      });
    });
  });
  return w>best;
}

                cr('div',{style:{fontSize:13,fontWeight:700,color:col,minWidth:40}},s.hrs.toFixed(1)+'h'),
                cr('div',{style:{fontSize:11,color:'#666'}},fmt12(s.bed)+' → '+fmt12(s.wake)),
                cr('div',{style:{flex:1,height:4,background:'#111',borderRadius:99,marginLeft:4}},
                  cr('div',{style:{height:4,borderRadius:99,background:col,width:Math.min(100,s.hrs/9*100)+'%'}}))
              );
            })
          )
        )
    );
  }

  // ── ZYNS TAB ─────────────────────────────────────────────────────────────────
  function ZynsTab(){
    var zynDates=allDates.filter(function(d){return all[d]&&all[d].zyns!=null;}).slice(0,60);
    var zynData=zynDates.map(function(d){return {date:d,v:parseInt(all[d].zyns)||0};});
    var avg7=zynData.slice(0,7).reduce(function(a,x){return a+x.v;},0)/Math.max(zynData.slice(0,7).length,1);
    var avg30=zynData.slice(0,30).reduce(function(a,x){return a+x.v;},0)/Math.max(zynData.slice(0,30).length,1);
    var zeroDays=zynData.filter(function(x){return x.v===0;}).length;
    // Weekly averages for trend
    var weeks={};
    zynData.forEach(function(x){
      var d=new Date(x.date+'T12:00:00');
      var mon=new Date(d);mon.setDate(d.getDate()-(d.getDay()===0?6:d.getDay()-1));
      var wk=mon.toISOString().slice(0,10);
      if(!weeks[wk]) weeks[wk]={sum:0,count:0};
      weeks[wk].sum+=x.v;weeks[wk].count++;
    });
    var weeklyAvgs=Object.keys(weeks).sort().slice(-8).map(function(wk){return {wk:wk,avg:weeks[wk].sum/weeks[wk].count};});
    return cr('div',null,
      cr('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginBottom:'1.25rem'}},
        StatCard('7-Day Avg',avg7.toFixed(1),'zyns/day',Spark(zynData.slice(0,7).map(function(x){return x.v;}).reverse(),'#fbbf24')),
        StatCard('30-Day Avg',avg30.toFixed(1),'zyns/day'),
        StatCard('Zero Zyn Days',zeroDays,'out of '+zynData.length+' logged'),
        StatCard('Weekly Trend',weeklyAvgs.length>=2&&weeklyAvgs[weeklyAvgs.length-1].avg<weeklyAvgs[weeklyAvgs.length-2].avg?'📉 Down':'📈 Up','vs last week',Spark(weeklyAvgs.map(function(x){return x.avg;}),'#fbbf24'))
      ),
      zynData.length===0
        ?cr('div',{style:{color:'#555',textAlign:'center',padding:'2rem'}},'No zyn data yet')
        :cr('div',null,
          cr('div',{style:{fontSize:11,color:T.se,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:8}},'Daily Log'),
          cr('div',{style:{display:'flex',flexDirection:'column',gap:4}},
            zynData.slice(0,30).map(function(z){
              var col=z.v===0?'#4ade80':z.v<=2?'#fbbf24':z.v<=4?T.or:'#f87171';
              var pct=Math.min(100,z.v/5*100);
              return cr('div',{key:z.date,style:{display:'flex',alignItems:'center',gap:10,background:T.ca,borderRadius:8,padding:'6px 12px',border:'1px solid '+T.bo}},
                cr('div',{style:{fontSize:12,color:T.se,minWidth:90}},fmts(z.date)),
                cr('div',{style:{fontSize:13,fontWeight:700,color:col,minWidth:24,textAlign:'right'}},z.v===0?'✓ 0':z.v),
                cr('div',{style:{flex:1,height:4,background:'#111',borderRadius:99}},
                  cr('div',{style:{height:4,borderRadius:99,background:col,width:pct+'%'}})),
                cr('div',{style:{fontSize:10,color:'#666',minWidth:60,textAlign:'right'}},z.v===0?'clean day':z.v===1?'1 zyn':z.v+' zyns')
              );
            })
          )
        )
    );
  }

  // ── HABITS HISTORY TAB ───────────────────────────────────────────────────────
  function HabitsTab(){
    var last30=Array.from({length:30},function(_,i){return dOff(29-i);});
    return cr('div',null,
      cr('div',{style:{fontSize:11,color:T.se,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:8}},'30-Day Completion per Habit'),
      cr('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        bools.map(function(h){
          var data=last30.map(function(d){return all[d]&&all[d][h.id]?1:0;});
          var pct=Math.round(data.reduce(function(a,v){return a+v;},0)/30*100);
          var streak=calcStreak(all,h.id);
          var isCore=h.cat==='core';
          return cr('div',{key:h.id,style:{background:T.ca,borderRadius:8,padding:'10px 12px',border:'1px solid '+(isCore?'rgba(191,87,0,0.3)':T.bo)}},
            cr('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}},
              cr('div',{style:{display:'flex',alignItems:'center',gap:6}},
                cr('span',{style:{fontSize:16}},h.em),
                cr('span',{style:{fontSize:13,fontWeight:600}},h.lb),
                isCore&&cr('span',{style:{fontSize:9,color:T.or,fontWeight:700,letterSpacing:'0.05em'}},'CORE')
              ),
              cr('div',{style:{display:'flex',alignItems:'center',gap:12}},
                cr('span',{style:{fontSize:12,color:T.se}},pct+'%'),
                streak>0&&cr('span',{style:{fontSize:12,fontWeight:700,color:T.or}},streak+' 🔥')
              )
            ),
            cr('div',{style:{display:'flex',gap:2}},
              last30.map(function(d,i){
                var done=all[d]&&all[d][h.id];
                return cr('div',{key:i,title:fmts(d),style:{flex:1,height:14,borderRadius:2,background:done?T.or:'#111',opacity:done?1:0.4}});
              })
            ),
            cr('div',{style:{height:3,background:'#111',borderRadius:99,marginTop:4}},
              cr('div',{style:{height:3,borderRadius:99,background:T.or,width:pct+'%'}}))
          );
        })
      )
    );
  }

  // ── WORKOUTS TAB ─────────────────────────────────────────────────────────────
  function WorkoutsTab(){
    var prMap=buildPRMap(wkts);
    var prEntries=Object.values(prMap).sort(function(a,b){return a.name.localeCompare(b.name);});
    return cr('div',null,
      prEntries.length>0&&cr('div',{style:{marginBottom:'1.25rem'}},
        cr('div',{style:{fontSize:11,color:T.se,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:8}},'🏆 Personal Records'),
        cr('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:8}},
          prEntries.map(function(pr){
            return cr('div',{key:pr.name,style:{background:T.ca,borderRadius:8,padding:'0.75rem',border:'1px solid rgba(191,87,0,0.3)'}},
              cr('div',{style:{fontSize:11,fontWeight:700,color:T.or,marginBottom:3,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}},pr.name),
              cr('div',{style:{fontSize:20,fontWeight:700,color:T.tx,lineHeight:1}},pr.rawWeight+(typeof pr.rawWeight==='number'?' lbs':'')),
              cr('div',{style:{fontSize:10,color:T.se,marginTop:2}},pr.reps+' reps · '+fmts(pr.date))
            );
          })
        )
      ),
      cr('div',{style:{fontSize:11,color:T.se,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:8}},'Recent Workouts'),
      cr('div',{style:{display:'flex',flexDirection:'column',gap:8}},
        wkts.slice(0,10).map(function(wk){
          return cr('div',{key:wk.id,style:{background:T.ca,borderRadius:10,padding:'0.875rem 1rem',border:'1px solid '+T.bo}},
            cr('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
              cr('div',{style:{fontSize:13,fontWeight:600}},fmts(wk.date)),
              cr('div',{style:{fontSize:11,color:T.se}},wk.type==='gym'?'🏋️ Gym':'🏠 Home')
            ),
            cr('div',{style:{display:'flex',flexWrap:'wrap',gap:'2px 12px'}},
              (wk.exercises||[]).map(function(ex,i){
                return cr('span',{key:i,style:{fontSize:11,color:T.se}},ex.name+(ex.sets?' ('+ex.sets.length+'×)':''));
              })
            )
          );
        })
      )
    );
  }

  // ── CHECK-IN HISTORY ─────────────────────────────────────────────────────────
  function CheckInTab(){
    var ciKeys=Object.keys(all).filter(function(k){return k.startsWith('__checkin_');}).sort().reverse();
    if(!ciKeys.length) return cr('div',{style:{color:'#555',textAlign:'center',padding:'2rem'}},'No check-ins yet — complete your first one on the Today tab');
    return cr('div',{style:{display:'flex',flexDirection:'column',gap:10}},
      ciKeys.map(function(k){
        var ci=all[k];if(!ci||typeof ci!=='object') return null;
        return cr('div',{key:k,style:{background:T.ca,borderRadius:10,padding:'0.875rem 1rem',border:'1px solid '+T.bo}},
          cr('div',{style:{fontSize:13,fontWeight:700,color:T.or,marginBottom:8}},ci.date||k),
          ci.best&&cr('div',{style:{marginBottom:6}},cr('div',{style:{fontSize:10,color:T.se,marginBottom:2}},'🏆 Best thing'),cr('div',{style:{fontSize:13}},ci.best)),
          ci.hard&&cr('div',{style:{marginBottom:6}},cr('div',{style:{fontSize:10,color:T.se,marginBottom:2}},'💪 Hardest thing'),cr('div',{style:{fontSize:13}},ci.hard)),
          ci.goal&&cr('div',null,cr('div',{style:{fontSize:10,color:T.se,marginBottom:2}},'🎯 Goal'),cr('div',{style:{fontSize:13}},ci.goal))
        );
      }).filter(Boolean)
    );
  }

  var STAT_TABS=[
    {id:'overview',l:'Overview'},
    {id:'habits',l:'Habits'},
    {id:'sleep',l:'Sleep'},
    {id:'zyns',l:'Zyns'},
    {id:'workouts',l:'Workouts'},
    {id:'checkins',l:'Check-Ins'},
  ];

  return cr('div',null,
    cr('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:'1.25rem',background:T.ca,borderRadius:10,padding:6,border:'1px solid '+T.bo}},
      STAT_TABS.map(function(t){return cr('button',{key:t.id,onClick:function(){sActiveTab(t.id);},style:tabStyle(t.id)},t.l);})
    ),
    activeTab==='overview'&&cr(OverviewTab,null),
    activeTab==='habits'&&cr(HabitsTab,null),
    activeTab==='sleep'&&cr(SleepTab,null),
    activeTab==='zyns'&&cr(ZynsTab,null),
    activeTab==='workouts'&&cr(WorkoutsTab,null),
    activeTab==='checkins'&&cr(CheckInTab,null)
  );
}

ReactDOM.render(cr(App,null),document.getElementById('root'));
</script>
</body>
</html>
